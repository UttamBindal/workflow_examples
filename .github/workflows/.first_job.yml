name: my_first_job

on: push

jobs:
    first_job:
        name: First Job
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v6.0.2
        - name: List cat README
          run: |
           echo "My first GITHUB ACTION"
           ls  
           cat README.md
        - name: Run ascii.sh
          run: |
           ls  -trlA
           chmod +x ascii.sh
           ./ascii.sh